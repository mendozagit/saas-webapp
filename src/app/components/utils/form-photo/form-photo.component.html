<div
  [style.width.px]="size()"
  [style.height.px]="size()"
  [style.max-height.px]="size()"
  [style.background-image]="imageUrl()"
  class="photo"
  [class.editable]="editable()"
>
  @if (editable()) {
    <i class="edit-icon dx-icon-photooutline"></i>
  }
</div>
@if (editable()) {
  <dx-file-uploader
    [dialogTrigger]="hostRef"
    [visible]="false"
    accept="image/*"
  ></dx-file-uploader>
}
